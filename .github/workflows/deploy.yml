name: Deploy React Project to Host

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Create deploy marker
        run: |
          echo "repo=${{ github.repository }}" > build/deploy-marker.txt
          echo "branch=${{ github.ref_name }}" >> build/deploy-marker.txt
          echo "commit=${{ github.sha }}" >> build/deploy-marker.txt
          echo "run_id=${{ github.run_id }}" >> build/deploy-marker.txt
          echo "deployed_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> build/deploy-marker.txt
          find build -maxdepth 2 -type f | sort

      - name: Sync files to host via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./build/
          server-dir: /
          log-level: verbose
